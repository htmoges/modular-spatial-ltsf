# L+PH+R+S — rlinear on traffic
model: gdf
backbone: rlinear
dataset: traffic

seq_len: 96
pred_len: 720
batch_size: 32
data_root: data

max_epochs: 50
learning_rate: 0.0008
patience: 10
lr_milestones: [30, 40]
lr_gamma: 0.5
gradient_clip: 1.0

use_temporal_head: true
use_input_residual: true

n_bands: 1
adj_rank: 16
adj_topk: 10
adj_tau: 1.0
self_loop_alpha: 0.2
diffusion_init: -4.0

monitor: val_mse_mean
results_dir: results
num_workers: 4
precision: 32
